name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  # Opt into Node.js 24 runtime for JavaScript actions now.
  # (This avoids the June 2nd, 2026 switchover surprises.)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Ensures correct asset paths when deployed under https://<user>.github.io/Draw/
          BASE_PATH: /Draw/
          # JiMeng proxy base URL (set in repo Settings -> Secrets and variables -> Actions)
          VITE_JIMENG_PROXY_URL: ${{ secrets.JIMENG_PROXY_URL }}
          # Demo only: direct browser key (WILL be exposed in built JS)
          VITE_JIMENG_API_KEY: ${{ secrets.JIMENG_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

